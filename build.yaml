# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # --- Standard (BLE bezpośrednio do laptopa) ---
  - board: nice_nano_v2
    shield: corne_left
    artifact-name: corne_left_standard
  - board: nice_nano_v2
    shield: corne_right
    artifact-name: corne_right_standard

  # --- Z dongle (dongle = USB central, lewy i prawy = peripheral) ---
  - board: nice_nano_v2
    shield: corne_dongle
    artifact-name: corne_dongle
  - board: nice_nano_v2
    shield: corne_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_left_peripheral
  - board: nice_nano_v2
    shield: corne_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_right_peripheral

  # --- Settings reset (potrzebne przy pierwszym flashowaniu z dongle) ---
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
